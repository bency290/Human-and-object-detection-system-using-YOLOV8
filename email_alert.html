<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; background-color: #f8fafc; padding: 20px; color: #0f172a;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0;">
        
        <div style="background-color: #ef4444; padding: 20px; text-align: center;">
            <h2 style="color: white; margin: 0; font-size: 24px; letter-spacing: 2px;">🚨 SECURITY ALERT</h2>
        </div>

        <div style="padding: 30px;">
            <p style="font-size: 16px; margin-bottom: 20px;">
                <strong>YOLOVISION</strong> has detected activity on your monitored feed.
            </p>
            
            <div style="background-color: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <p style="margin: 5px 0;"><strong>Detection Count:</strong> {{ person_count }} Person(s)</p>
                <p style="margin: 5px 0;"><strong>Timestamp:</strong> {{ time }}</p>
            </div>

            <p style="font-size: 14px; color: #64748b;">
                Please find the annotated visual evidence attached to this email.
            </p>
            
            <a href="http://127.0.0.1:8000/dashboard/" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background-color: #0ea5e9; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">
                VIEW DASHBOARD
            </a>
        </div>
    </div>
</body>
</html>
